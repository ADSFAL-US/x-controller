# =============================================================================
# Конфигурация 3x-ui панелей
# =============================================================================
# Поддерживаются две версии API:
#   legacy   — 3x-ui < 2.6.0 (только session-cookie auth через login/password)
#   2.6.0+   — 3x-ui >= 2.6.0 (Bearer token + новые эндпоинты)
#
# Документация API 2.6.0+: https://github.com/MHSanaei/3x-ui
# Все эндпоинты: /panel/api/*
# -----------------------------------------------------------------------------

panels:
  - name: panel-1
    # ------------------------------- Connection --------------------------------
    host: http://localhost:2053             # Базовый хост (без секретного пути)
    panel_path: ''                          # Секретный путь к панели (если есть)
    api_version: legacy                     # legacy | 2.6.0 | 2.7.0 | …

    # ----------------------------- Authentication -------------------------------
    # Для api_version >= 2.6.0 (Bearer token, Settings → Security → API Token):
    #   - Токен действителен до регенерации
    #   - Не требует session cookie / CSRF
    #   - Рекомендуемый способ для ботов и автоматизации
    # api_token: '<paste-token-here>'

    # Для legacy (или как fallback на 2.6.0+):
    username: admin
    password: admin
    # two_factor_code: ''                 # OTP для 2FA (только 2.6.0+, опционально)

    # ----------------------------- Subscription --------------------------------
    sub_host: ''                            # Отдельный хост для подписок (опционально)
    sub_path: /sub                          # Путь к подписке

    # -------------------------------- Limits -----------------------------------
    priority: 1                             # Приоритет (меньше = выше)
    max_clients: 100                        # Макс. клиентов на панели

  # ===========================================================================
  # Пример 2: панель 2.6.0+ с Bearer токеном, секретным путём и отдельным
  #           хостом для подписок
  # ===========================================================================
  # - name: panel-2
  #   host: https://2.26.20.199:49238
  #   panel_path: /F3cpGfVrFucX4pkB7z
  #   api_version: 2.6.0
  #
  #   # Bearer token (приоритетнее username/password на 2.6.0+)
  #   api_token: 'eyJhbGciOiJIUzI1NiIs...'
  #
  #   # Fallback логин (используется если api_token не задан или при ошибке)
  #   username: admin
  #   password: secret
  #
  #   sub_host: https://2.26.20.199:8080
  #   sub_path: /avava-vpn
  #   priority: 2
  #   max_clients: 200

  # ===========================================================================
  # Пример 3: несколько токенов для разных целей (на одной панели)
  # ===========================================================================
  # - name: panel-3-prod
  #   host: https://vpn.example.com
  #   panel_path: ''
  #   api_version: 2.6.0
  #   api_token: 'prod-token-abc'
  #   sub_host: https://sub.example.com
  #   sub_path: /sub
  #   priority: 1
  #   max_clients: 500
